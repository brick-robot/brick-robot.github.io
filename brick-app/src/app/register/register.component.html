<div *ngIf="platform === 'desktop'; else mobileForm">
  <div id="qr-code">
    <h2>Scan the QR code with your mobile device to continue.</h2>
    <img [src]="qrCodeDataUrl" alt="QR Code">
  </div>
</div>
<ng-template #mobileForm>
  <form (ngSubmit)="register()" #registerForm="ngForm">
    <div>
      <label for="email">Email:</label>
      <input type="email" id="email" [(ngModel)]="email" name="email" required email #emailModel="ngModel">
      <div *ngIf="emailModel.invalid && (emailModel.dirty || emailModel.touched)">
        <div *ngIf="emailModel.errors?.['required']">
          Email is required.
        </div>
        <div *ngIf="emailModel.errors?.['email']">
          Please enter a valid email address.
        </div>
      </div>
    </div>
    <button type="submit" [disabled]="submitting || registerForm.invalid">Submit</button>
  </form>
</ng-template>

<p *ngIf="submitting">Submitting...</p>
<p *ngIf="successMessage">{{ successMessage }}</p>
<p *ngIf="errorMessage">{{ errorMessage }}</p>
<p>Invite your friends using this link: <a [href]="inviteLink">{{ inviteLink }}</a></p>
<br>
{{referrerId}}
